#Datebase
spring.datasource.url=${JDBC_DATABASE_URL}
spring.datasource.username=${JDBC_USERNAME}
spring.datasource.password=${JDBC_PASSWORD}
spring.jpa.hibernate.ddl-auto=none

#Liquibase
spring.liquibase.change-log=classpath:database/liquibase-changelog.xml
spring.liquibase.enabled=true

#Actuator
management.endpoints.web.exposure.include=*

#Cookies
server.servlet.session.cookie.same-site=None
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.max-age=24h

#Email
app.email.from=codesage2025@gmail.com
spring.mail.host=smtp-relay.brevo.com
spring.mail.port=2525
spring.mail.username=a0f6c2001@smtp-brevo.com
spring.mail.password=${EMAIL_PASSWORD_KEY}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

#Google OAuth2
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
app.redirected.url=https://www.codesage.pl/courses

#AWS S3
aws.access-key=${AWS_ACCESS_KEY}
aws.secret-key=${AWS_SECRET_EY}
aws.region=eu-central-1
aws.s3.bucket=codesage-course-images
aws.url=https://codesage-course-images.s3.eu-central-1.amazonaws.com

#Image
spring.servlet.multipart.max-file-size=6MB